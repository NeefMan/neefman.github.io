<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethan Lahr</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="d-flex flex-column" style="min-height: 100vh">
    <nav class="navbar navbar-expand-sm bg-light navbar-light justify-content-between px-4 border-bottom">
        <a href="/" class="navbar-brand text-primary fw-bold">Ethan Lahr</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#collapsibleNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="collapsibleNavbar">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a href="/" class="nav-link">Home</a>
                </li>
                <li class="nav-item">
                    <a href="/brag-sheet/" class="nav-link">Brag Sheet</a>
                </li>
                <li class="nav-item border-bottom border-2 border-primary">
                    <a href="/contact/" class="nav-link text-primary">Contact</a>
                </li>
            </ul>
        </div>
    </nav>

    <form class="container my-5 bg-light p-3 rounded-3 shadow border" style="max-width: 650px;" action="https://formspree.io/f/xrevanqy" method="post">
        <div class="mb-3">
            <label class="form-label" for="nameInput">Name</label>
            <input name="Name" type="text" class="form-control" id="nameInput" placeholder="Enter your full name here">
        </div>
        <div class="mb-3">
            <label class="form-label" for="emailInput">Email address</label>
            <input name="Email Address" type="email" class="form-control" id="emailInput" placeholder="Enter your email address here">
        </div>
        <div class="mb-3">
            <label class="form-label" for="message">Message</label>
            <textarea name="Message" class="form-control" id="message" rows="7" placeholder="Enter your message here"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Submit</button>
    </form>

    <footer class="container-fluid py-2 mt-auto text-center d-flex flex-column align-items-center">
        <span>&copy; 2025 Ethan Lahr. All rights reserved.</span>
        <span class="d-flex align-items-center gap-1">
            Made with
            <a href="https://getbootstrap.com" target="_blank" class="text-decoration-none d-flex">
                <img src="https://getbootstrap.com/docs/5.3/assets/brand/bootstrap-logo.svg"
                    alt="Bootstrap"
                    height="16">
            </a>
        </span>
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
